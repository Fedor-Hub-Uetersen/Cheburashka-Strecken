<script>
        const WORK_DURATION = 60, REST_DURATION = 120;
        const i18n = {
            ru: { 
                main: "Время работать ✨", sound: "🔔 Сигнал:", dig: "Цифровой", gong: "Гонг", bowl: "Чаша", 
                rest: "Время разминки! 🧘‍♂️", mOn: "🎵 Музыка", mOff: "⏸ Пауза", back: "Вернуться", 
                ex: ["Взгляд вдаль", "Потянись вверх", "Глоток воды"] 
            },
            de: { 
                main: "Zeit zu arbeiten ✨", sound: "🔔 Pausensignal:", dig: "Digital", gong: "Gong", bowl: "Schale", 
                rest: "Zeit für die Pause! 🧘‍♂️", mOn: "🎵 Musik", mOff: "⏸ Pause", back: "Zurück", 
                ex: ["Blick in die Ferne", "Streck dich", "Wasser trinken"] 
            }
        };

        let currentLang = localStorage.getItem('chebu_lang') || 'ru';
        const musicAudio = document.getElementById('bg-music');
        musicAudio.src = "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3";

        function applyLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('chebu_lang', lang);
            
            // Основной экран
            document.getElementById('main-title').innerText = i18n[lang].main;
            document.getElementById('sound-label').innerText = i18n[lang].sound;
            document.getElementById('opt-dig').innerText = i18n[lang].dig;
            document.getElementById('opt-gong').innerText = i18n[lang].gong;
            document.getElementById('opt-bowl').innerText = i18n[lang].bowl;

            // Оверлей
            document.getElementById('rest-title').innerText = i18n[lang].rest;
            document.getElementById('s-btn').innerText = i18n[lang].back;
            document.getElementById('m-btn').innerText = musicAudio.paused ? i18n[lang].mOn : i18n[lang].mOff;
            document.getElementById('exercises-list').innerHTML = i18n[lang].ex.map(e => `<li>${e}</li>`).join('');
            
            // Переключатели
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.id.includes(lang)));
        }

        function updateTimer() {
            const now = Math.floor(Date.now() / 1000);
            let endTime = parseInt(localStorage.getItem('chebu_endTime'));
            if (!endTime || endTime < now - 300) { startWorkMode(); return; }
            let timeLeft = endTime - now;
            if (timeLeft <= 0) {
                if (localStorage.getItem('chebu_mode') === 'work') {
                    localStorage.setItem('chebu_mode', 'rest');
                    localStorage.setItem('chebu_endTime', now + REST_DURATION);
                    document.getElementById('overlay').classList.add('active');
                    document.getElementById('alarm-sound').src = document.getElementById('alarm-sound-select').value;
                    document.getElementById('alarm-sound').play().catch(()=>{});
                } else {
                    let s = parseInt(localStorage.getItem('chebu_streak') || 0) + 1;
                    localStorage.setItem('chebu_streak', s);
                    document.getElementById('streak-display').innerText = `Bio-Score: ${s}`;
                    startWorkMode();
                }
            } else {
                let el = localStorage.getItem('chebu_mode') === 'work' ? document.getElementById('w-timer') : document.getElementById('r-timer');
                el.innerText = `${Math.floor(timeLeft/60).toString().padStart(2,'0')}:${(timeLeft%60).toString().padStart(2,'0')}`;
            }
        }

        function startWorkMode() {
            localStorage.setItem('chebu_mode', 'work');
            localStorage.setItem('chebu_endTime', Math.floor(Date.now() / 1000) + WORK_DURATION);
            document.getElementById('overlay').classList.remove('active');
            musicAudio.pause();
        }

        setInterval(updateTimer, 1000);
        applyLanguage(currentLang);
    </script>
